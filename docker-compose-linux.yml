name: platform-shared

# ── Shared environment blocks (YAML anchors) ─────────────────────────────────
# All variables are read from .env — change DB_NAME, passwords, ports, etc. there.
x-db-env: &db-env
  DATABASE_URL: postgres://${DB_LEAD_SVC_USER}:${DB_LEAD_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_TENANT: postgres://${DB_TENANT_SVC_USER}:${DB_TENANT_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_SERVICE: postgres://${DB_SERVICE_USER}:${DB_SERVICE_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}

# NOTE: this file was already missing admin-service/lookup-admin relative to
# docker-compose.yml before this trim (a pre-existing gap, not introduced
# here) — flagged as a follow-up, not fixed in this pass.
#
# Cross-repo networking (NOT solved here — see docker-compose.yml's note):
# api-gateway's product-service URLs are env-driven so this stays valid once
# the parent workspace wires an external Docker network across repos.

services:
  postgres:
    image: postgres:18.4
    container_name: ${DB_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ${DB_DATA_PATH}:/var/lib/postgresql
      - ./msq-core/db_scripts/01_init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  identity-service:
    image: crm-identity-service
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${IDENTITY_SERVICE_PORT}
      <<: *db-env
    # Internal-only: reachable over the compose network, not published to host.
    expose:
      - "${IDENTITY_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  communication-service:
    image: crm-communication-service
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${COMMUNICATION_SERVICE_PORT}
    expose:
      - "${COMMUNICATION_SERVICE_PORT}"

  api-gateway:
    image: crm-api-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${GATEWAY_PORT}
      <<: *db-env
      IDENTITY_SERVICE_URL: http://identity-service:${IDENTITY_SERVICE_PORT}
      COMMUNICATION_SERVICE_URL: http://communication-service:${COMMUNICATION_SERVICE_PORT}
      # Product service URLs — resolved against the shared Docker network once
      # the parent workspace wires it. Point these at msq-lms/msq-hrms/
      # msq-todo's containers in your .env.
      LEADS_SERVICE_URL: ${LEADS_SERVICE_URL}
      META_SERVICE_URL: ${META_SERVICE_URL}
      NOTIFICATIONS_SERVICE_URL: ${NOTIFICATIONS_SERVICE_URL}
      HR_SERVICE_URL: ${HR_SERVICE_URL}
      TASKS_SERVICE_URL: ${TASKS_SERVICE_URL}
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_started
      communication-service:
        condition: service_started

  # P4.3: one image per product, shared SSO cookie. See docker-compose.yml for
  # the topology notes. These consume prebuilt images shipped to the server.
  auth-web:
    image: crm-auth-web
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3000"
      API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
