name: platform-shared

# ── Shared environment blocks (YAML anchors) ─────────────────────────────────
# All variables are read from .env — change DB_NAME, passwords, ports, etc. there.
x-db-env: &db-env
  DATABASE_URL: postgres://${DB_LEAD_SVC_USER}:${DB_LEAD_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_TENANT: postgres://${DB_TENANT_SVC_USER}:${DB_TENANT_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_SERVICE: postgres://${DB_SERVICE_USER}:${DB_SERVICE_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}

# Browser-facing build args for the shared web images (auth-web, lookup-admin).
x-web-public-args: &web-public-args
  NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${GATEWAY_PORT}}
  API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
  NEXT_PUBLIC_PASSWORD_MIN_LENGTH: ${NEXT_PUBLIC_PASSWORD_MIN_LENGTH:-12}
  NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-http://localhost:3000}
  NEXT_PUBLIC_LMS_URL: ${NEXT_PUBLIC_LMS_URL:-http://localhost:3001}
  NEXT_PUBLIC_HR_URL: ${NEXT_PUBLIC_HR_URL:-http://localhost:3002}
  NEXT_PUBLIC_TASK_URL: ${NEXT_PUBLIC_TASK_URL:-http://localhost:3003}

# ── Cross-repo networking (NOT solved here — tracked follow-up) ─────────────
# api-gateway proxies to product services (leads-service, hr-service,
# tasks-service, notifications-service, meta-conversion-api) that now live in
# msq-lms/msq-hrms/msq-todo, not this repo. The *_SERVICE_URL vars below are
# still env-driven so this compose file stays valid once the parent workspace
# wires an external Docker network joining every repo's containers together
# (D5 Stage 1: pnpm-workspace.yaml already does this for code; compose needs
# the equivalent `docker network create platform-net` + `external: true` on
# each repo's compose file). That wiring is not done in this pass.

services:
  postgres:
    image: postgres:18.4
    container_name: ${DB_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ${DB_DATA_PATH}:/var/lib/postgresql
      - ./db_scripts/01_init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${IDENTITY_SERVICE_PORT}
      <<: *db-env
    # Internal-only: reachable by other services over the compose network, but
    # NOT published to the host. Only the api-gateway is exposed externally.
    expose:
      - "${IDENTITY_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  communication-service:
    build:
      context: .
      dockerfile: services/communication-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${COMMUNICATION_SERVICE_PORT}
    expose:
      - "${COMMUNICATION_SERVICE_PORT}"

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${ADMIN_SERVICE_PORT}
      <<: *db-env
    expose:
      - "${ADMIN_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${GATEWAY_PORT}
      <<: *db-env
      IDENTITY_SERVICE_URL: http://identity-service:${IDENTITY_SERVICE_PORT}
      COMMUNICATION_SERVICE_URL: http://communication-service:${COMMUNICATION_SERVICE_PORT}
      ADMIN_SERVICE_URL: http://admin-service:${ADMIN_SERVICE_PORT}
      # Product service URLs — resolved against the shared Docker network once
      # the parent workspace wires it (see note above). Point these at
      # msq-lms/msq-hrms/msq-todo's containers in your .env.
      LEADS_SERVICE_URL: ${LEADS_SERVICE_URL}
      META_SERVICE_URL: ${META_SERVICE_URL}
      NOTIFICATIONS_SERVICE_URL: ${NOTIFICATIONS_SERVICE_URL}
      HR_SERVICE_URL: ${HR_SERVICE_URL}
      TASKS_SERVICE_URL: ${TASKS_SERVICE_URL}
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_started
      communication-service:
        condition: service_started
      admin-service:
        condition: service_started

  auth-web:
    build:
      context: .
      dockerfile: apps/auth-web/Dockerfile
      args: *web-public-args
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3000"
      API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

  lookup-admin:
    build:
      context: .
      dockerfile: apps/lookup-admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${GATEWAY_PORT}}
        API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3001"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${GATEWAY_PORT}}
      API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    ports:
      - "3005:3001"
    depends_on:
      - api-gateway

  # Optional reverse proxy simulating the *.app.com SSO topology. Depends on
  # product web apps (lms-web/hr-web/todo-web) that live in the product repos
  # — only meaningful when run from the parent workspace with all repos
  # networked together, not standalone from this repo alone.
  caddy:
    image: caddy:2-alpine
    profiles: ["sso-proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - auth-web
