name: msq

# ── Shared environment blocks (YAML anchors) ─────────────────────────────────
# All variables are read from .env — change DB_NAME, passwords, ports, etc. there.
x-db-env: &db-env
  DATABASE_URL: postgres://${DB_LEAD_SVC_USER}:${DB_LEAD_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_TENANT: postgres://${DB_TENANT_SVC_USER}:${DB_TENANT_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_SERVICE: postgres://${DB_SERVICE_USER}:${DB_SERVICE_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}

# Image names must match what `docker compose build` tags from
# docker-compose.yml: those services use `build:` with no `image:` key, so
# compose names them <project>-<service> and the project (top of this file) is
# `msq`. msq-deploy/build-deploy.ps1 exports exactly this set.
#
# Cross-repo networking (NOT solved here — see docker-compose.yml's note):
# api-gateway's product-service URLs are env-driven so this stays valid once
# the parent workspace wires an external Docker network across repos.

services:
  postgres:
    image: postgres:18.4
    container_name: ${DB_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ${DB_DATA_PATH}:/var/lib/postgresql
      # Schema bootstrap. The DDL that used to live in the single
      # msq-core/db_scripts/01_init-db.sql is now the ordered 01-06 set in the
      # platform-root db_scripts/. Mounted file-by-file (rather than mounting
      # the whole directory) so ONLY the schema runs at first-boot -- the
      # seed/cleanup scripts 07+ stay opt-in, exactly as before.
      - ./db_scripts/01_extensions_and_roles.sql:/docker-entrypoint-initdb.d/01-extensions-and-roles.sql
      - ./db_scripts/02_schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
      - ./db_scripts/03_product_schema.sql:/docker-entrypoint-initdb.d/03-product-schema.sql
      - ./db_scripts/04_roles_and_grants.sql:/docker-entrypoint-initdb.d/04-roles-and-grants.sql
      - ./db_scripts/05_catalogs.sql:/docker-entrypoint-initdb.d/05-catalogs.sql
      - ./db_scripts/06_rls.sql:/docker-entrypoint-initdb.d/06-rls.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  identity-service:
    image: msq-identity-service
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${IDENTITY_SERVICE_PORT}
      <<: *db-env
    # Internal-only: reachable over the compose network, not published to host.
    expose:
      - "${IDENTITY_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  communication-service:
    image: msq-communication-service
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${COMMUNICATION_SERVICE_PORT}
    expose:
      - "${COMMUNICATION_SERVICE_PORT}"

  admin-service:
    image: msq-admin-service
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${ADMIN_SERVICE_PORT}
      <<: *db-env
    expose:
      - "${ADMIN_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    image: msq-api-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${GATEWAY_PORT}
      <<: *db-env
      IDENTITY_SERVICE_URL: http://identity-service:${IDENTITY_SERVICE_PORT}
      COMMUNICATION_SERVICE_URL: http://communication-service:${COMMUNICATION_SERVICE_PORT}
      ADMIN_SERVICE_URL: http://admin-service:${ADMIN_SERVICE_PORT}
      # Product service URLs — resolved against the shared Docker network once
      # the parent workspace wires it. Point these at msq-lms/msq-hrms/
      # msq-todo's containers in your .env.
      LEADS_SERVICE_URL: ${LEADS_SERVICE_URL}
      META_SERVICE_URL: ${META_SERVICE_URL}
      NOTIFICATIONS_SERVICE_URL: ${NOTIFICATIONS_SERVICE_URL}
      HR_SERVICE_URL: ${HR_SERVICE_URL}
      TASKS_SERVICE_URL: ${TASKS_SERVICE_URL}
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_started
      communication-service:
        condition: service_started
      admin-service:
        condition: service_started

  # P4.3: one image per product, shared SSO cookie. See docker-compose.yml for
  # the topology notes. These consume prebuilt images shipped to the server.
  #
  # NEXT_PUBLIC_* values are baked in at build time on the Windows build host,
  # so setting them here does nothing for browser-facing URLs — if the server's
  # public hostname differs from the build-time default, rebuild the web images
  # with the right build args rather than editing this file.
  auth-web:
    image: msq-auth-web
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3000"
      API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

  lookup-admin:
    image: msq-lookup-admin
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3001"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${GATEWAY_PORT}}
      API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    ports:
      - "3005:3001"
    depends_on:
      - api-gateway
