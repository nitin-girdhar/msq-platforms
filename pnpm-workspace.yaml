# Thin workspace hub for local multi-repo dev (D5 Stage 1). This repo
# (msq-platforms) is just the container: it holds no product code of its
# own — msq-core/ is the platform-core product repo, and msq-lms/, msq-hrms/,
# msq-todo/ are cloned here as independent sibling git repos (not
# submodules — see README.md for the clone layout).
#
# This file globs all four repos' packages/services/apps so pnpm symlinks
# @platform/* into each product exactly as it did inside the original
# monorepo, once you run `pnpm install` from this root with all four repos
# present.
#
# Each product repo ALSO keeps its own pnpm-workspace.yaml (globbing only its
# own packages/*, services/*, apps/*) so it can build standalone once
# repointed at published @platform/* deps (D5 Stage 2/3, git-tag/registry).
packages:
  - 'msq-core/packages/*'
  - 'msq-core/services/*'
  - 'msq-core/apps/*'
  - 'msq-lms/packages/*'
  - 'msq-lms/services/*'
  - 'msq-lms/apps/*'
  - 'msq-hrms/packages/*'
  - 'msq-hrms/services/*'
  - 'msq-hrms/apps/*'
  - 'msq-todo/packages/*'
  - 'msq-todo/services/*'
  - 'msq-todo/apps/*'
allowBuilds:
  esbuild: true
  sharp: true
